name: Claude Code Fix (Write Access)

on:
  repository_dispatch:
    types: [layout-plan, layout-edit, layout-revert, email-generate]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-fix:
    if: |
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      (contains(github.event.comment.body, '@claude-fix') || contains(github.event.comment.body, '@claude-create')) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load instructions
        id: load-instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            NUM="${{ github.event.issue.number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi

          ISSUE_JSON=$(gh issue view $NUM --json labels,title,body)
          LABELS=$(echo "$ISSUE_JSON" | jq -r '.labels[].name' | tr '\n' ' ')
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')

          if echo "$LABELS" | grep -qiE "enhancement|feature|new feature"; then
            TEMPLATE_FILE=".github/workflows/prompts/end-to-end-feature-github.md"
          elif echo "$LABELS" | grep -qi "bug"; then
            TEMPLATE_FILE=".github/workflows/prompts/bug-fix-github.md"
          else
            TEMPLATE_FILE=".github/workflows/prompts/bug-fix-github.md"
          fi

          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "Template not found: $TEMPLATE_FILE — using inline prompt"
            TEMPLATE="Fix issue #$NUM: $TITLE\n\n$BODY"
          else
            TEMPLATE=$(cat $TEMPLATE_FILE)
          fi

          # Safe variable substitution using awk to avoid shell escaping issues
          # with special characters in TITLE and BODY (backticks, $, quotes, etc.)
          export REPO="${{ github.repository }}"
          export ISSUE_NUM="$NUM"
          export ISSUE_TITLE="$TITLE"
          export ISSUE_BODY="$BODY"
          export TRIGGER_USER="${{ github.event.comment.user.login }}"
          export BRANCH="claude/issue-$NUM-$(date +%Y%m%d-%H%M)"

          TEMPLATE=$(echo "$TEMPLATE" | awk '{
            gsub(/\$REPOSITORY/, ENVIRON["REPO"])
            gsub(/\$ISSUE_NUMBER/, ENVIRON["ISSUE_NUM"])
            gsub(/\$ISSUE_TITLE/, ENVIRON["ISSUE_TITLE"])
            gsub(/\$ISSUE_BODY/, ENVIRON["ISSUE_BODY"])
            gsub(/\$TRIGGERED_BY/, ENVIRON["TRIGGER_USER"])
            gsub(/\$BRANCH_NAME/, ENVIRON["BRANCH"])
            gsub(/\$CREATE_BRANCH/, "true")
            gsub(/\$CREATE_PR/, "true")
            gsub(/\$COMMENT_ON_ISSUE/, "true")
            gsub(/\$PLAN_PATH/, "")
            print
          }')

          DELIMITER="INSTRUCTIONS_$(date +%s)_EOF"
          echo "CUSTOM_INSTRUCTIONS<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$TEMPLATE" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          custom_instructions: ${{ steps.load-instructions.outputs.CUSTOM_INSTRUCTIONS }}
          direct_prompt: "true"

  layout-plan:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'layout-plan'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Load plan prompt template
        id: load-prompt
        run: |
          TEMPLATE=$(cat ".github/workflows/prompts/layout-plan-github.md")

          export TARGET_PAGE="${{ github.event.client_payload.targetPage }}"
          export USER_MESSAGE="${{ github.event.client_payload.message }}"
          export CHAT_HISTORY="${{ github.event.client_payload.chatHistory }}"
          export CURRENT_PLAN="${{ github.event.client_payload.currentPlan }}"

          TEMPLATE=$(echo "$TEMPLATE" | awk '{
            gsub(/\$TARGET_PAGE/, ENVIRON["TARGET_PAGE"])
            gsub(/\$USER_MESSAGE/, ENVIRON["USER_MESSAGE"])
            gsub(/\$CHAT_HISTORY/, ENVIRON["CHAT_HISTORY"])
            gsub(/\$CURRENT_PLAN/, ENVIRON["CURRENT_PLAN"])
            print
          }')

          DELIMITER="INSTRUCTIONS_$(date +%s)_EOF"
          echo "CUSTOM_INSTRUCTIONS<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$TEMPLATE" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write prompt to file
        run: |
          cat > /tmp/plan-prompt.txt << 'PROMPT_HEREDOC_EOF'
          ${{ steps.load-prompt.outputs.CUSTOM_INSTRUCTIONS }}
          PROMPT_HEREDOC_EOF

      - name: Run Claude Code (plan mode)
        id: claude-plan
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --output-format json --max-turns 5 --allowedTools "Write,Read,Bash" -p "$(cat /tmp/plan-prompt.txt)" > /tmp/claude-raw.json 2>&1 || true
          if [ ! -f /tmp/plan-output.json ]; then
            jq -r '.result // empty' /tmp/claude-raw.json 2>/dev/null | jq '.' > /tmp/plan-output.json 2>/dev/null || true
          fi

      - name: Send plan callback
        if: always()
        env:
          SESSION_ID: ${{ github.event.client_payload.sessionId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          CALLBACK_SECRET: ${{ github.event.client_payload.callbackSecret }}
        run: |
          # Try to parse plan output, with multiple fallbacks
          AI_RESPONSE="Het plan is bijgewerkt op basis van je bericht."
          UPDATED_PLAN=""

          if [ -f /tmp/plan-output.json ]; then
            AI_RESPONSE=$(jq -r '.aiResponse // "Plan is bijgewerkt."' /tmp/plan-output.json 2>/dev/null || echo "Plan is bijgewerkt.")
            UPDATED_PLAN=$(jq -r '.updatedPlan // ""' /tmp/plan-output.json 2>/dev/null || echo "")
          elif [ -f /tmp/claude-raw.json ]; then
            # Fallback: extract from Claude CLI output
            RESULT=$(jq -r '.result // ""' /tmp/claude-raw.json 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              AI_RESPONSE="$RESULT"
              UPDATED_PLAN="$RESULT"
            fi
          fi

          # Always send callback — never let it fail silently
          AI_ESC=$(echo "$AI_RESPONSE" | jq -Rs . 2>/dev/null || echo '"Plan verwerkt."')
          PLAN_ESC=$(echo "$UPDATED_PLAN" | jq -Rs . 2>/dev/null || echo '""')

          curl -s -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: $CALLBACK_SECRET" \
            -d "{\"sessionId\":\"$SESSION_ID\",\"aiResponse\":$AI_ESC,\"updatedPlan\":$PLAN_ESC}" || true

  layout-edit:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'layout-edit'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and checkout branch
        run: |
          BRANCH_NAME="${{ github.event.client_payload.branchName }}"
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"

      - name: Load prompt template
        id: load-prompt
        run: |
          TEMPLATE_FILE=".github/workflows/prompts/layout-edit-github.md"

          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "::error::Prompt template not found: $TEMPLATE_FILE"
            exit 1
          fi

          TEMPLATE=$(cat "$TEMPLATE_FILE")

          # Safe variable substitution using awk to avoid shell escaping issues
          export TARGET_PAGE="${{ github.event.client_payload.targetPage }}"
          export USER_PROMPT="${{ github.event.client_payload.prompt }}"
          export BRANCH_NAME="${{ github.event.client_payload.branchName }}"
          export SESSION_ID="${{ github.event.client_payload.sessionId }}"
          export CALLBACK_URL="${{ github.event.client_payload.callbackUrl }}"
          export CALLBACK_SECRET="${{ github.event.client_payload.callbackSecret }}"
          export REPO="${{ github.repository }}"

          TEMPLATE=$(echo "$TEMPLATE" | awk '{
            gsub(/\$TARGET_PAGE/, ENVIRON["TARGET_PAGE"])
            gsub(/\$USER_PROMPT/, ENVIRON["USER_PROMPT"])
            gsub(/\$BRANCH_NAME/, ENVIRON["BRANCH_NAME"])
            gsub(/\$SESSION_ID/, ENVIRON["SESSION_ID"])
            gsub(/\$CALLBACK_URL/, ENVIRON["CALLBACK_URL"])
            gsub(/\$CALLBACK_SECRET/, ENVIRON["CALLBACK_SECRET"])
            gsub(/\$REPOSITORY/, ENVIRON["REPO"])
            print
          }')

          DELIMITER="INSTRUCTIONS_$(date +%s)_EOF"
          echo "CUSTOM_INSTRUCTIONS<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$TEMPLATE" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Write prompt to file
        run: |
          cat > /tmp/edit-prompt.txt << 'EDIT_PROMPT_EOF'
          ${{ steps.load-prompt.outputs.CUSTOM_INSTRUCTIONS }}
          EDIT_PROMPT_EOF

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --max-turns 15 --allowedTools "Write,Read,Edit,Bash,Glob,Grep" -p "$(cat /tmp/edit-prompt.txt)" || true

      - name: Commit and push changes
        env:
          BRANCH_NAME: ${{ github.event.client_payload.branchName }}
        run: |
          git config user.name "Claude Code"
          git config user.email "noreply@anthropic.com"

          # Check for uncommitted changes (Claude may not have committed)
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "ai(layout): automated changes" || true
          fi

          # Push branch if it has commits ahead of origin/main
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "0")
          if [ "$COMMITS_AHEAD" -gt "0" ]; then
            git push origin "$BRANCH_NAME" || git push --force-with-lease origin "$BRANCH_NAME" || true
          else
            echo "No changes to push"
          fi

      - name: Send success callback
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.event.client_payload.branchName }}
          TARGET_PAGE: ${{ github.event.client_payload.targetPage }}
          SESSION_ID: ${{ github.event.client_payload.sessionId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          CALLBACK_SECRET: ${{ github.event.client_payload.callbackSecret }}
        run: |
          # Create PR first — need it before we can get the Vercel preview URL
          echo "Creating PR for branch: $BRANCH_NAME"
          PR_CREATE_OUTPUT=$(gh pr create --head "$BRANCH_NAME" --base main \
            --title "AI Layout: $TARGET_PAGE" \
            --body "Layout wijziging via AI editor" 2>&1) || true
          echo "PR create output: $PR_CREATE_OUTPUT"

          # Get PR number
          PR_NUM=$(echo "$PR_CREATE_OUTPUT" | grep -oP '/pull/\K[0-9]+' || true)
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number' 2>&1) || true
          fi
          PR_NUM=${PR_NUM:-0}
          echo "Final PR_NUM: $PR_NUM"

          # Build preview URL — Vercel truncates subdomains to 63 chars
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '/' '-')
          FULL_SUBDOMAIN="klaaskroezen-website-git-${SAFE_BRANCH}-llm-solutions-projects"
          # Truncate to 63 chars (DNS label limit)
          SUBDOMAIN=$(echo "$FULL_SUBDOMAIN" | cut -c1-63)
          PREVIEW_URL="https://${SUBDOMAIN}.vercel.app"
          echo "Preview URL: $PREVIEW_URL"

          if [ "$PR_NUM" = "0" ]; then
            curl -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Callback-Secret: $CALLBACK_SECRET" \
              -d "{\"sessionId\":\"$SESSION_ID\",\"status\":\"failed\",\"errorMessage\":\"Kon geen PR aanmaken. Controleer de workflow logs.\"}"
          else
            curl -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Callback-Secret: $CALLBACK_SECRET" \
              -d "{\"sessionId\":\"$SESSION_ID\",\"status\":\"preview\",\"previewUrl\":\"$PREVIEW_URL\",\"prNumber\":$PR_NUM}"
          fi

      - name: Send failure callback
        if: failure()
        env:
          SESSION_ID: ${{ github.event.client_payload.sessionId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          CALLBACK_SECRET: ${{ github.event.client_payload.callbackSecret }}
        run: |
          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: $CALLBACK_SECRET" \
            -d "{\"sessionId\":\"$SESSION_ID\",\"status\":\"failed\",\"errorMessage\":\"Claude Code action failed. Check workflow logs for details.\"}"

  layout-revert:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'layout-revert'

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Revert the merge commit
        env:
          COMMIT_SHA: ${{ github.event.client_payload.commitSha }}
          TARGET_PAGE: ${{ github.event.client_payload.targetPage }}
        run: |
          git config user.name "Claude Code"
          git config user.email "noreply@anthropic.com"
          git revert --no-edit "$COMMIT_SHA"
          git push origin main

  email-generate:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'email-generate'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Load prompt template
        id: load-prompt
        run: |
          TEMPLATE=$(cat ".github/workflows/prompts/email-generate.md")

          export USER_PROMPT="${{ github.event.client_payload.prompt }}"
          export IMAGE_URLS="${{ github.event.client_payload.imageUrls }}"
          export EXISTING_HTML="${{ github.event.client_payload.existingHtml }}"
          export MODE="${{ github.event.client_payload.mode }}"
          export LANG="${{ github.event.client_payload.lang }}"
          export SESSION_ID="${{ github.event.client_payload.sessionId }}"
          export CALLBACK_URL="${{ github.event.client_payload.callbackUrl }}"
          export CALLBACK_SECRET="${{ github.event.client_payload.callbackSecret }}"
          export REPO="${{ github.repository }}"

          TEMPLATE=$(echo "$TEMPLATE" | awk '{
            gsub(/\$USER_PROMPT/, ENVIRON["USER_PROMPT"])
            gsub(/\$IMAGE_URLS/, ENVIRON["IMAGE_URLS"])
            gsub(/\$EXISTING_HTML/, ENVIRON["EXISTING_HTML"])
            gsub(/\$MODE/, ENVIRON["MODE"])
            gsub(/\$LANG/, ENVIRON["LANG"])
            gsub(/\$SESSION_ID/, ENVIRON["SESSION_ID"])
            gsub(/\$CALLBACK_URL/, ENVIRON["CALLBACK_URL"])
            gsub(/\$CALLBACK_SECRET/, ENVIRON["CALLBACK_SECRET"])
            gsub(/\$REPOSITORY/, ENVIRON["REPO"])
            print
          }')

          DELIMITER="INSTRUCTIONS_$(date +%s)_EOF"
          echo "CUSTOM_INSTRUCTIONS<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$TEMPLATE" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Write prompt to file
        run: |
          cat > /tmp/email-prompt.txt << 'EMAIL_PROMPT_EOF'
          ${{ steps.load-prompt.outputs.CUSTOM_INSTRUCTIONS }}
          EMAIL_PROMPT_EOF

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --max-turns 5 --allowedTools "Write,Read,Bash" -p "$(cat /tmp/email-prompt.txt)" || true

      - name: Send callback with generated HTML
        if: success()
        env:
          SESSION_ID: ${{ github.event.client_payload.sessionId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          CALLBACK_SECRET: ${{ github.event.client_payload.callbackSecret }}
        run: |
          if [ -f /tmp/email-output.html ]; then
            HTML_CONTENT=$(cat /tmp/email-output.html | jq -Rs .)
          else
            HTML_CONTENT='"<p>Geen output gegenereerd.</p>"'
          fi

          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: $CALLBACK_SECRET" \
            -d "{\"sessionId\":\"$SESSION_ID\",\"status\":\"completed\",\"generatedHtml\":$HTML_CONTENT}"

      - name: Send failure callback
        if: failure()
        env:
          SESSION_ID: ${{ github.event.client_payload.sessionId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          CALLBACK_SECRET: ${{ github.event.client_payload.callbackSecret }}
        run: |
          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: $CALLBACK_SECRET" \
            -d "{\"sessionId\":\"$SESSION_ID\",\"status\":\"failed\",\"errorMessage\":\"Email generation failed. Check workflow logs.\"}"

  unauthorized:
    if: |
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      (contains(github.event.comment.body, '@claude-fix') || contains(github.event.comment.body, '@claude-create')) &&
      github.event.comment.author_association != 'OWNER' &&
      github.event.comment.author_association != 'MEMBER' &&
      github.event.comment.author_association != 'COLLABORATOR'

    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ @${context.actor} - Not authorized. Only repository owners, members, and collaborators can trigger Claude.`
              });
            }
